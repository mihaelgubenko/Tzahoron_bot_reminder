<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель - Ган Лиора</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #E8F4F8 0%, #F0F8E8 25%, #FFF8F0 50%, #F8F0F8 75%, #E8F4F8 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 48px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        
        .login-header {
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-family: 'Comfortaa', cursive;
            font-size: 2rem;
            color: #2D8659;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #6B6B6B;
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E0E0E0;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: #FFFFFF;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2D8659;
            box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.1);
        }
        
        .login-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2D8659 0%, #4A9B73 100%);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Comfortaa', cursive;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 12px rgba(45, 134, 89, 0.3);
            margin-top: 8px;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 134, 89, 0.4);
            background: linear-gradient(135deg, #4A9B73 0%, #2D8659 100%);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #2D8659;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .back-link:hover {
            color: #4A9B73;
            text-decoration: underline;
        }
        
        .loading {
            display: none;
            color: #2D8659;
            margin-top: 12px;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Вход в админ-панель</h1>
            <p>Ган «Лиора» - Управление заявками</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="login-button">Войти</button>
            
            <div class="loading" id="loading">Вход...</div>
        </form>
        
        <a href="/" class="back-link">← Вернуться на главную</a>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Скрыть предыдущую ошибку
            errorMessage.classList.remove('show');
            loading.classList.add('show');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Успешный вход - перенаправляем на админ-панель
                    window.location.href = '/admin.html';
                } else {
                    // Ошибка входа
                    errorMessage.textContent = data.message || 'Неверное имя пользователя или пароль';
                    errorMessage.classList.add('show');
                    loading.classList.remove('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Произошла ошибка при входе. Попробуйте позже.';
                errorMessage.classList.add('show');
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
